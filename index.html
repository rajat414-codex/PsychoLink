    <!-- ════════════════════════════════════════════════════════
         BACKEND (Railway) — permanent live backend
         ════════════════════════════════════════════════════════ -->
    <script>
      // 👇 Railway backend URL (permanent)
      window.API_BASE = "https://psycholink-production.up.railway.app";

      // Auto-rewrite: saari localhost:3001 calls ko Railway backend pe bhejta hai
      (function () {
        var _fetch = window.fetch;
        window.fetch = function (url, opts) {
          if (window.API_BASE && typeof url === 'string' && url.indexOf('localhost:3001') !== -1) {
            url = url.replace('http://localhost:3001', window.API_BASE)
                     .replace('https://localhost:3001', window.API_BASE);
          }
          return _fetch(url, opts);
        };
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
